<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Besties™ at USC - Where Trojans Become Besties</title>
    <meta name="description" content="Download Besties™ - the social app exclusively for USC students. Find friends, missed connections, hangouts & more.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Open Graph -->
    <meta property="og:title" content="Besties™ at USC - Where Trojans Become Besties">
    <meta property="og:description" content="The social app exclusively for USC students. Find friends, missed connections, hangouts & more. Fight On! ✌️">
    <meta property="og:image" content="https://allmybesties.com/logo.png">
    <meta property="og:url" content="https://allmybesties.com/usc">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        // Smart redirect — fires before render
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            var isAndroid = /android/i.test(ua);
            
            if (isIOS) {
                window.location.href = "https://apps.apple.com/us/app/besties-usc/id6757664170";
            } else if (isAndroid) {
                window.location.href = "https://play.google.com/store/apps/details?id=com.bestiesatusc.app&hl=en_US";
            }
            // Desktop/other: show landing page
        })();
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Neon glow background (matches app store aesthetic) ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 0% 0%, rgba(255,50,0,0.55) 0%, rgba(200,0,0,0.3) 30%, transparent 70%),
                radial-gradient(ellipse 70% 60% at 100% 100%, rgba(255,199,44,0.5) 0%, rgba(255,180,0,0.25) 30%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(153,0,0,0.15) 0%, transparent 100%),
                radial-gradient(ellipse 60% 40% at 10% 50%, rgba(255,100,0,0.2) 0%, transparent 100%),
                radial-gradient(ellipse 60% 40% at 90% 40%, rgba(255,199,44,0.2) 0%, transparent 100%),
                radial-gradient(ellipse 80% 50% at 50% 5%, rgba(200,0,0,0.3) 0%, transparent 100%),
                linear-gradient(135deg, #1a0800 0%, #0d0000 30%, #000000 70%, #0a0500 100%);
        }
        /* Subtle grid overlay */
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 45px 45px;
        }

        /* ── Main container ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 40px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255,199,44,0.4)) drop-shadow(0 0 50px rgba(153,0,0,0.2)); }
            50% { filter: drop-shadow(0 0 30px rgba(255,199,44,0.6)) drop-shadow(0 0 70px rgba(153,0,0,0.35)); }
        }

        /* ── Logo ── */
        .logo-wrap {
            width: 130px;
            height: 130px;
            margin-bottom: 20px;
            border-radius: 30px;
            overflow: hidden;
            animation: fadeUp 0.6s ease-out 0.1s both, glowPulse 3s ease-in-out infinite;
        }
        .logo-wrap svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── Title ── */
        .title {
            font-size: 56px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 10px;
            animation: fadeUp 0.6s ease-out 0.15s both;
            text-shadow:
                0 0 20px rgba(255,255,255,0.7),
                0 0 50px rgba(153,0,0,0.8),
                0 0 80px rgba(153,0,0,0.4);
        }
        .title .tm {
            font-size: 0.35em;
            vertical-align: super;
            font-weight: 700;
            color: #FFC72C;
            text-shadow: 0 0 15px rgba(255,199,44,0.6);
        }

        .usc-badge {
            display: inline-block;
            background: #990000;
            color: #fff;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            padding: 6px 24px;
            margin-bottom: 16px;
            animation: fadeUp 0.6s ease-out 0.2s both;
            box-shadow: 0 0 30px rgba(153,0,0,0.5);
        }

        .tagline {
            font-size: 20px;
            font-weight: 700;
            color: #FFC72C;
            margin-bottom: 36px;
            animation: fadeUp 0.6s ease-out 0.25s both;
            text-shadow: 0 0 25px rgba(255,199,44,0.6);
        }

        /* ── Store buttons ── */
        .store-buttons {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeUp 0.6s ease-out 0.3s both;
        }

        .store-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .store-btn:active { transform: scale(0.97); }
        .store-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,199,44,0.15);
        }

        .store-btn.apple {
            background: #FFC72C;
            color: #000;
        }
        .store-btn.google {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1.5px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .store-btn svg { width: 28px; height: 28px; flex-shrink: 0; }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: left;
            line-height: 1.2;
        }
        .btn-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }
        .btn-store {
            font-size: 18px;
            font-weight: 800;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            margin-bottom: 20px;
            animation: fadeUp 0.6s ease-out 0.35s both;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── Instagram ── */
        .ig-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            animation: fadeUp 0.6s ease-out 0.4s both;
        }
        .ig-link:hover {
            transform: translateY(-2px);
            border-color: rgba(221,42,123,0.5);
            box-shadow: 0 6px 24px rgba(221,42,123,0.15);
        }
        .ig-link svg { width: 20px; height: 20px; }

        /* ── Footer ── */
        .footer-row {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: fadeUp 0.6s ease-out 0.45s both;
        }
        .footer-row .edu {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
        }
        .footer-row .edu span {
            color: rgba(255,255,255,0.55);
        }
        .footer-row .fight-on {
            font-size: 16px;
            font-weight: 900;
            color: #990000;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(153,0,0,0.6);
        }
        .footer-row .copyright {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            margin-top: 4px;
        }
        .footer-row a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
        }

        /* ── Responsive ── */
        @media (max-height: 700px) {
            .container { padding: 24px 24px; }
            .logo-wrap { width: 100px; height: 100px; margin-bottom: 14px; }
            .title { font-size: 44px; }
            .tagline { margin-bottom: 24px; }
            .badge { margin-bottom: 18px; }
        }
        @media (max-width: 380px) {
            .title { font-size: 44px; }
            .usc-badge { font-size: 15px; padding: 5px 18px; }
        }
    </style>
</head>
<body>

        <div class="title">Besties<span class="tm">™</span></div>
